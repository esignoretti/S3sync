<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3sync</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand"><a href="/">S3sync</a></div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/setup">Setup</a>
        </div>
    </nav>
    <main class="main">
        {{block "content" .}}<p>empty</p>{{end}}
    </main>

    <div id="edit-modal" class="modal-overlay" style="display:none">
        <div class="modal">
            <h3>Edit Sync Pair</h3>
            <label>Sync Interval (s)
                <input type="number" id="edit-interval" min="10" step="10">
            </label>
            <label>Worker Count
                <input type="number" id="edit-workers" min="1" max="100">
            </label>
            <label>Max Get Ops / min (0 = unlimited)
                <input type="number" id="edit-max-ops" min="0" step="10">
            </label>
            <label>Webhook URL
                <input type="text" id="edit-webhook-url" placeholder="https://hooks.example.com/sync">
            </label>
            <label>Webhook Events (error, success, all, or comma-separated)
                <input type="text" id="edit-webhook-events" placeholder="error">
            </label>
            <label class="checkbox-label"><input type="checkbox" id="edit-dry-run"> Dry run (preview only)</label>
            <div class="modal-actions">
                <button class="btn btn-sm btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-sm btn-primary" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script defer src="/static/app.js"></script>
</body>
</html>
