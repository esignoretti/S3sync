{{template "layout" .}}
{{define "content"}}
<h1 class="page-title">Sync History: {{.Name}}</h1>
<div id="history-table"><p>Loading...</p></div>
<a href="/" class="btn btn-sm btn-secondary" style="margin-top:16px">Back to Dashboard</a>
<script>
async function loadHistory() {
  let pairId = '{{.PairID}}';
  let el = document.getElementById('history-table');
  try {
    let res = await fetch('/api/sync-pairs/' + pairId + '/logs');
    let json = await res.json();
    let logs = json.data || json || [];
    el.innerHTML = '';
    if (logs.length === 0) {
      el.innerHTML = '<p>No sync history yet.</p>';
      return;
    }
    let table = document.createElement('table');
    table.style.cssText = 'width:100%;border-collapse:collapse;font-size:13px';
    let thead = table.createTHead();
    let hr = thead.insertRow();
    hr.style.cssText = 'border-bottom:1px solid var(--hairline)';
    ['Time','Status','Succeeded','Failed','Error'].forEach(h => {
      let th = document.createElement('th');
      th.style.cssText = 'text-align:left;padding:8px';
      th.textContent = h;
      hr.appendChild(th);
    });
    let tbody = table.createTBody();
    logs.forEach(l => {
      let tr = tbody.insertRow();
      tr.style.cssText = 'border-bottom:1px solid var(--hairline)';

      let t = l.completed_at ? new Date(l.completed_at).toLocaleString() : '—';
      let tdTime = tr.insertCell();
      tdTime.style.cssText = 'padding:8px';
      tdTime.textContent = t;

      let sc = l.status === 'ok' ? 'status-synced' : l.status === 'error' ? 'status-error' : '';
      let tdStatus = tr.insertCell();
      tdStatus.style.cssText = 'padding:8px';
      let pill = tdStatus.appendChild(document.createElement('span'));
      pill.className = 'status-pill ' + sc;
      pill.textContent = l.status || '—';

      let tdSuc = tr.insertCell();
      tdSuc.style.cssText = 'padding:8px';
      tdSuc.textContent = l.succeeded || 0;

      let tdFai = tr.insertCell();
      tdFai.style.cssText = 'padding:8px';
      tdFai.textContent = l.failed || 0;

      let tdErr = tr.insertCell();
      tdErr.style.cssText = 'padding:8px;color:var(--red)';
      tdErr.textContent = l.error_msg || '';
    });
    el.appendChild(table);
  } catch(e) {
    el.textContent = 'Failed to load history.';
  }
}
loadHistory();
</script>
{{end}}
